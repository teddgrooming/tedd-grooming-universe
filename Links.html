<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tedd Grooming</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #080808;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 20px 70px;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Animated background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,168,75,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(29,212,196,0.05) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 60% 30%, rgba(196,82,122,0.04) 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgPulse {
    0%   { opacity: 0.6; transform: scale(1); }
    100% { opacity: 1;   transform: scale(1.05); }
  }

  #grid-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* All content above bg */
  .brand, .two-col, .section-label-full,
  .embed-wrapper, .footer { position: relative; z-index: 1; }

  /* ── Header ── */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    text-align: center;
  }

  .logo-wrap {
    position: relative;
    margin-bottom: 18px;
  }

  .logo-img {
    width: 320px;
    height: auto;
    filter: drop-shadow(0 0 24px rgba(200,168,75,0.35)) brightness(1.05);
    animation: logoPulse 4s ease-in-out infinite alternate;
  }

  @keyframes logoPulse {
    from { filter: drop-shadow(0 0 16px rgba(200,168,75,0.25)) brightness(1); }
    to   { filter: drop-shadow(0 0 32px rgba(200,168,75,0.5)) brightness(1.1); }
  }

  .brand-name {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, #c8a84b 50%, #fff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmerText 4s linear infinite;
  }

  @keyframes shimmerText {
    to { background-position: 200% center; }
  }

  .brand-tagline {
    font-size: 14px;
    font-weight: 700;
    color: #aaa;
    letter-spacing: 3px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    max-width: 480px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a2a2a 30%, #c8a84b44 50%, #2a2a2a 70%, transparent);
    margin: 8px 0 0;
  }

  /* ── Two column ── */
  .two-col {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    align-items: flex-start;
    margin-top: 28px;
  }

  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a84b;
    margin: 0 0 10px;
    opacity: 0.7;
  }

  .section-label-full {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a84b;
    margin: 32px 0 12px;
    width: 100%;
    max-width: 480px;
    opacity: 0.7;
  }

  /* ── Link buttons ── */
  .links {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    color: #ccc;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  /* Shimmer sweep on hover */
  .link-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    transition: left 0.4s ease;
  }

  .link-btn:hover::before { left: 160%; }

  .link-btn:hover {
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }

  .link-btn:active { transform: scale(0.97); }

  .link-btn .icon {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .link-btn:hover .icon { transform: scale(1.1); }

  .link-btn .label { flex: 1; text-transform: uppercase; }
  .link-btn .arrow { font-size: 14px; color: #333; }

  /* Social hover colors */
  .btn-tiktok:hover  { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
  .btn-tiktok .icon  { background: rgba(255,255,255,0.06); }

  .btn-instagram:hover { border-color: rgba(225,48,108,0.5); background: rgba(225,48,108,0.08); box-shadow: 0 8px 30px rgba(225,48,108,0.15); }
  .btn-instagram .icon { background: rgba(225,48,108,0.1); }

  .btn-facebook:hover { border-color: rgba(24,119,242,0.5); background: rgba(24,119,242,0.08); box-shadow: 0 8px 30px rgba(24,119,242,0.15); }
  .btn-facebook .icon { background: rgba(24,119,242,0.1); }

  .btn-youtube:hover { border-color: rgba(255,0,0,0.5); background: rgba(255,0,0,0.08); box-shadow: 0 8px 30px rgba(255,0,0,0.15); }
  .btn-youtube .icon { background: rgba(255,0,0,0.1); }

  .btn-whatsapp:hover { border-color: rgba(37,211,102,0.5); background: rgba(37,211,102,0.08); box-shadow: 0 8px 30px rgba(37,211,102,0.15); }
  .btn-whatsapp .icon { background: rgba(37,211,102,0.1); }

  .btn-website:hover  { border-color: rgba(200,168,75,0.5); background: rgba(200,168,75,0.08); box-shadow: 0 8px 30px rgba(200,168,75,0.15); }
  .btn-website .icon  { background: rgba(200,168,75,0.1); }

  .btn-catalog:hover  { border-color: rgba(200,168,75,0.5); background: rgba(200,168,75,0.08); box-shadow: 0 8px 30px rgba(200,168,75,0.2); }
  .icon-catalog       { background: radial-gradient(circle at 30% 30%, rgba(200,168,75,0.28), rgba(200,168,75,0.06)); }
  .catalog-spark      { animation: catalogTwinkle 2s ease-in-out infinite; transform-origin: center; }

  @keyframes catalogTwinkle {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 1; }
  }

  .icon-quiz    { background: radial-gradient(circle at 30% 30%, rgba(29,212,196,0.28), rgba(29,212,196,0.06)); }
  .quiz-spark   { animation: quizTwinkle 1.8s ease-in-out infinite; transform-origin: center; }
  .quiz-spark:nth-child(2) { animation-delay: 0.3s; }
  .quiz-spark:nth-child(3) { animation-delay: 0.6s; }

  @keyframes quizTwinkle {
    0%, 100% { opacity: 0.25; transform: translateY(0); }
    50%      { opacity: 1; transform: translateY(-1.5px); }
  }

  .icon-game   { background: radial-gradient(circle at 30% 30%, rgba(200,168,75,0.28), rgba(200,168,75,0.06)); }
  .game-spark  { animation: gameTwinkle 1.8s ease-in-out infinite; transform-origin: center; }
  .game-spark:nth-child(4)  { animation-delay: 0.2s; }
  .game-spark:nth-child(5)  { animation-delay: 0.4s; }
  .game-spark:nth-child(6)  { animation-delay: 0.6s; }
  .game-spark:nth-child(7)  { animation-delay: 0.8s; }
  .game-spark:nth-child(8)  { animation-delay: 1s; }

  @keyframes gameTwinkle {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 1; }
  }

  .draw-spark  { animation: drawTwinkle 1.8s ease-in-out infinite; transform-origin: center; }
  .draw-spark:nth-child(5) { animation-delay: 0.3s; }

  @keyframes drawTwinkle {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  .btn-shopee:hover   { border-color: rgba(238,77,45,0.5); background: rgba(238,77,45,0.08); box-shadow: 0 8px 30px rgba(238,77,45,0.15); }
  .btn-shopee .icon   { background: rgba(238,77,45,0.1); }

  .btn-lazada:hover   { border-color: rgba(99,48,175,0.5); background: rgba(99,48,175,0.08); box-shadow: 0 8px 30px rgba(99,48,175,0.15); }
  .btn-lazada .icon   { background: rgba(99,48,175,0.1); }

  .btn-draw:hover     { border-color: rgba(196,82,122,0.5); background: rgba(196,82,122,0.08); box-shadow: 0 8px 30px rgba(196,82,122,0.15); }
  .btn-draw .icon     { background: rgba(196,82,122,0.1) !important; }

  .btn-website.loading { opacity: 0.6; pointer-events: none; }

  /* ── Tools wrapper ── */
  .embed-wrapper {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 52px;
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Entry animations ── */
  .brand      { animation: fadeUp 0.6s ease both; }
  .two-col    { animation: fadeUp 0.6s 0.15s ease both; }
  .section-label-full { animation: fadeUp 0.6s 0.25s ease both; }
  .embed-wrapper { animation: fadeUp 0.6s 0.3s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

  <script>
    /* ── Electricity grid canvas ── */
    (function () {
      const canvas = document.getElementById('grid-canvas');
      const ctx = canvas.getContext('2d');
      const CELL_FAR  = 80;   // deep layer — larger cells, dimmer
      const CELL_NEAR = 40;   // close layer — smaller cells, brighter
      let W, H, last = 0, spawnTimer = 0;
      const pulses = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function spawnPulse() {
        const horiz = Math.random() > 0.5;
        // Snap to a near-grid line so the pulse rides a visible line
        const snap  = CELL_NEAR;
        const count = horiz ? Math.ceil(H / snap) : Math.ceil(W / snap);
        const idx   = Math.floor(Math.random() * count);
        const fixed = idx * snap;
        const fast  = Math.random() > 0.7;           // occasional fast bolt
        const silver = Math.random() > 0.5;          // silver vs electric-blue

        pulses.push({
          horiz,
          fixed,
          pos   : -10,
          speed : fast ? 400 + Math.random() * 300 : 100 + Math.random() * 150,
          len   : fast ? 60 + Math.random() * 80   : 25 + Math.random() * 50,
          alpha : 0.5 + Math.random() * 0.5,
          color : silver ? '210,220,255' : '160,200,255',
          width : fast ? 1.5 : 1,
        });
      }

      function drawGrid() {
        // Far layer (depth — bigger cells, very dim)
        ctx.lineWidth = 0.5;
        ctx.strokeStyle = 'rgba(160,170,200,0.04)';
        for (let x = 0; x <= W; x += CELL_FAR) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y <= H; y += CELL_FAR) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
        // Near layer (closer — smaller cells, brighter)
        ctx.lineWidth = 0.5;
        ctx.strokeStyle = 'rgba(190,200,220,0.09)';
        for (let x = 0; x <= W; x += CELL_NEAR) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y <= H; y += CELL_NEAR) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
      }

      function frame(ts) {
        const dt = Math.min((ts - last) / 1000, 0.05);
        last = ts;

        ctx.clearRect(0, 0, W, H);
        drawGrid();

        // Spawn
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnPulse();
          if (Math.random() > 0.6) spawnPulse(); // sometimes two at once
          spawnTimer = 0.1 + Math.random() * 0.25;
        }

        // Draw pulses
        for (let i = pulses.length - 1; i >= 0; i--) {
          const p = pulses[i];
          p.pos += p.speed * dt;
          const limit = (p.horiz ? W : H) + p.len + 10;
          if (p.pos - p.len > limit) { pulses.splice(i, 1); continue; }

          const x0 = p.horiz ? p.pos - p.len : p.fixed;
          const y0 = p.horiz ? p.fixed       : p.pos - p.len;
          const x1 = p.horiz ? p.pos         : p.fixed;
          const y1 = p.horiz ? p.fixed       : p.pos;

          const grad = ctx.createLinearGradient(x0, y0, x1, y1);
          grad.addColorStop(0,    'transparent');
          grad.addColorStop(0.3,  `rgba(${p.color},${p.alpha * 0.4})`);
          grad.addColorStop(0.7,  `rgba(${p.color},${p.alpha})`);
          grad.addColorStop(1,    `rgba(${p.color},${p.alpha * 0.1})`);

          ctx.save();
          ctx.shadowColor = `rgba(${p.color},0.9)`;
          ctx.shadowBlur  = 8;
          ctx.strokeStyle = grad;
          ctx.lineWidth   = p.width;
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y1);
          ctx.stroke();
          // bright leading tip
          ctx.shadowBlur  = 14;
          ctx.lineWidth   = p.width * 1.5;
          ctx.strokeStyle = `rgba(${p.color},${p.alpha})`;
          ctx.beginPath();
          ctx.moveTo(p.horiz ? p.pos - 4 : p.fixed, p.horiz ? p.fixed : p.pos - 4);
          ctx.lineTo(p.horiz ? p.pos     : p.fixed, p.horiz ? p.fixed : p.pos);
          ctx.stroke();
          ctx.restore();
        }

        requestAnimationFrame(frame);
      }
      requestAnimationFrame(t => { last = t; frame(t); });
    })();

    // WhatsApp bubble
    function handleWebsite(el) {
      el.classList.add('loading');
      setTimeout(() => el.classList.remove('loading'), 4000);
    }

    function openApp(e, iosScheme, androidIntent, webUrl) {
      e.preventDefault();
      const ua = navigator.userAgent;
      const isAndroid = /Android/i.test(ua);
      const isIOS = /iPhone|iPad|iPod/i.test(ua);

      // Desktop — open web URL in new tab as normal
      if (!isAndroid && !isIOS) {
        window.open(webUrl, '_blank', 'noopener');
        return;
      }

      // Android — intent:// URI handles app + fallback natively in Chrome
      if (isAndroid && androidIntent) {
        window.location.href = androidIntent;
        return;
      }

      // iOS — try custom URL scheme; fall back to web if app not installed
      if (isIOS && iosScheme) {
        let appOpened = false;
        const onBlur = () => { appOpened = true; };
        window.addEventListener('blur', onBlur, { once: true });
        setTimeout(() => {
          window.removeEventListener('blur', onBlur);
          if (!appOpened) window.location.href = webUrl;
        }, 650);
        window.location.href = iosScheme;
        return;
      }

      // Fallback
      window.location.href = webUrl;
    }

    // WhatsApp: try regular app, then WhatsApp Business app, then web
    function openWhatsApp(e, phone, webUrl) {
      e.preventDefault();
      const ua = navigator.userAgent;
      const isAndroid = /Android/i.test(ua);
      const isIOS = /iPhone|iPad|iPod/i.test(ua);

      if (!isAndroid && !isIOS) {
        window.open(webUrl, '_blank', 'noopener');
        return;
      }

      // Regular and Business WhatsApp both register the same "whatsapp://"
      // scheme, so the OS opens whichever one is actually installed.
      // (Avoid intent:// with an explicit package on Android — if that exact
      // package isn't installed, Chrome sends the user to the Play Store
      // instead of trying the other WhatsApp app.)
      let appOpened = false;
      const onHide = () => { appOpened = true; };
      window.addEventListener('blur', onHide, { once: true });
      document.addEventListener('visibilitychange', onHide, { once: true });
      setTimeout(() => {
        window.removeEventListener('blur', onHide);
        document.removeEventListener('visibilitychange', onHide);
        if (!appOpened) window.location.href = webUrl;
      }, 650);
      window.location.href = `whatsapp://send?phone=${phone}`;
    }
  </script>
