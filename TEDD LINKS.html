<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tedd Grooming</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #080808;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 20px 70px;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Animated background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,168,75,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(29,212,196,0.05) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 60% 30%, rgba(196,82,122,0.04) 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgPulse {
    0%   { opacity: 0.6; transform: scale(1); }
    100% { opacity: 1;   transform: scale(1.05); }
  }

  /* Subtle grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* All content above bg */
  .brand, .two-col, .section-label-full,
  .embed-wrapper, .footer { position: relative; z-index: 1; }

  /* ── Header ── */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    text-align: center;
  }

  .logo-wrap {
    position: relative;
    margin-bottom: 18px;
  }

  .logo-img {
    width: 320px;
    height: auto;
    filter: drop-shadow(0 0 24px rgba(200,168,75,0.35)) brightness(1.05);
    animation: logoPulse 4s ease-in-out infinite alternate;
  }

  @keyframes logoPulse {
    from { filter: drop-shadow(0 0 16px rgba(200,168,75,0.25)) brightness(1); }
    to   { filter: drop-shadow(0 0 32px rgba(200,168,75,0.5)) brightness(1.1); }
  }

  .brand-name {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 5px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, #c8a84b 50%, #fff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmerText 4s linear infinite;
  }

  @keyframes shimmerText {
    to { background-position: 200% center; }
  }

  .brand-tagline {
    font-size: 11px;
    color: #555;
    letter-spacing: 3px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    max-width: 480px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a2a2a 30%, #c8a84b44 50%, #2a2a2a 70%, transparent);
    margin: 8px 0 0;
  }

  /* ── Two column ── */
  .two-col {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    align-items: flex-start;
    margin-top: 28px;
  }

  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a84b;
    margin: 0 0 10px;
    opacity: 0.7;
  }

  .section-label-full {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a84b;
    margin: 32px 0 12px;
    width: 100%;
    max-width: 480px;
    opacity: 0.7;
  }

  /* ── Link buttons ── */
  .links {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    color: #ccc;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  /* Shimmer sweep on hover */
  .link-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    transition: left 0.4s ease;
  }

  .link-btn:hover::before { left: 160%; }

  .link-btn:hover {
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }

  .link-btn:active { transform: scale(0.97); }

  .link-btn .icon {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .link-btn:hover .icon { transform: scale(1.1); }

  .link-btn .label { flex: 1; }
  .link-btn .arrow { font-size: 14px; color: #333; }

  /* Social hover colors */
  .btn-tiktok:hover  { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
  .btn-tiktok .icon  { background: rgba(255,255,255,0.06); }

  .btn-instagram:hover { border-color: rgba(225,48,108,0.5); background: rgba(225,48,108,0.08); box-shadow: 0 8px 30px rgba(225,48,108,0.15); }
  .btn-instagram .icon { background: rgba(225,48,108,0.1); }

  .btn-facebook:hover { border-color: rgba(24,119,242,0.5); background: rgba(24,119,242,0.08); box-shadow: 0 8px 30px rgba(24,119,242,0.15); }
  .btn-facebook .icon { background: rgba(24,119,242,0.1); }

  .btn-website:hover  { border-color: rgba(200,168,75,0.5); background: rgba(200,168,75,0.08); box-shadow: 0 8px 30px rgba(200,168,75,0.15); }
  .btn-website .icon  { background: rgba(200,168,75,0.1); }

  .btn-shopee:hover   { border-color: rgba(238,77,45,0.5); background: rgba(238,77,45,0.08); box-shadow: 0 8px 30px rgba(238,77,45,0.15); }
  .btn-shopee .icon   { background: rgba(238,77,45,0.1); }

  .btn-lazada:hover   { border-color: rgba(99,48,175,0.5); background: rgba(99,48,175,0.08); box-shadow: 0 8px 30px rgba(99,48,175,0.15); }
  .btn-lazada .icon   { background: rgba(99,48,175,0.1); }

  .btn-draw:hover     { border-color: rgba(196,82,122,0.5); background: rgba(196,82,122,0.08); box-shadow: 0 8px 30px rgba(196,82,122,0.15); }
  .btn-draw .icon     { background: rgba(196,82,122,0.1) !important; }

  .btn-website.loading { opacity: 0.6; pointer-events: none; }

  /* ── Tools wrapper ── */
  .embed-wrapper {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 52px;
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Entry animations ── */
  .brand      { animation: fadeUp 0.6s ease both; }
  .two-col    { animation: fadeUp 0.6s 0.15s ease both; }
  .section-label-full { animation: fadeUp 0.6s 0.25s ease both; }
  .embed-wrapper { animation: fadeUp 0.6s 0.3s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <!-- Header -->
  <div class="brand">
    <div class="logo-wrap">
      <img class="logo-img" src="shop/images/tedd-logo.png" alt="Tedd Grooming">
    </div>

  <div class="divider"></div>

  <!-- Follow Us + Find Us side by side -->
  <div class="two-col">

  </div>

  <!-- Try Our Stuff -->
  <div class="section-label-full">Try Our Stuff</div>
  <div class="embed-wrapper">

    <a class="link-btn btn-game" href="TEDD GAME.html">

    <a class="link-btn btn-draw" href="TEDD LUCKY DRAW WINNERS.html">

    <a class="link-btn btn-catalog" href="shop/TEDD CATALOG.html">

  </div>

  <div class="footer">© 2026 Tedd Grooming</div>

  <script>
    function handleWebsite(el) {
      el.classList.add('loading');
      setTimeout(() => el.classList.remove('loading'), 4000);
    }
  </script>

</body>
</html>
