<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Tedd Product</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #141410;
    border: 0.5px solid #2e2c24;
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .wordmark {
    text-align: center;
    font-size: 15px;
    color: #e6c76a;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .prog-track {
    background: #1e1e1a;
    border-radius: 99px;
    height: 3px;
    width: 100%;
  }
  .prog-fill {
    background: #c8a84b;
    border-radius: 99px;
    height: 3px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .prog-label {
    font-size: 11px;
    color: #fff;
    text-align: right;
    margin-top: 4px;
  }

  .question-text {
    font-size: 17px;
    font-weight: 500;
    color: #fff;
    line-height: 1.4;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    background: #0e0e0b;
    border: 0.5px solid #2e2c24;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: #fff;
    cursor: pointer;
    text-align: left;
    touch-action: manipulation;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt.selected {
    border-color: #c8a84b;
    background: #1c1a12;
    color: #fff;
  }
  .opt:hover:not(.selected) { border-color: #4a4438; }
  .opt.penned { opacity: 0.3; cursor: not-allowed; border-style: dashed; }

  .btn {
    background: #c8a84b;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.3px;
    touch-action: manipulation;
    transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:not(:disabled):hover { opacity: 0.88; }

  .intro-headline {
    font-size: 22px;
    font-weight: 500;
    color: #fff;
    text-align: center;
    line-height: 1.3;
  }
  .intro-sub {
    font-size: 14px;
    color: #aaa;
    text-align: center;
    line-height: 1.6;
  }

  .result-badge {
    font-size: 10px;
    color: #fff;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .result-name {
    font-size: 22px;
    font-weight: 500;
    color: #c8a84b;
    margin-top: 4px;
    line-height: 1.2;
  }
  .result-detail {
    font-size: 13px;
    color: #fff;
    margin-top: 4px;
  }
  .scent-pill {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 99px;
    margin-top: 8px;
  }
  .result-divider {
    height: 0.5px;
    background: #222;
  }
  .why-label {
    font-size: 10px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .why-text {
    font-size: 14px;
    color: #fff;
    line-height: 1.6;
    margin-top: 6px;
  }

  .combo-card {
    background: #0e0e0b;
    border: 0.5px solid #c8a84b;
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .combo-label {
    font-size: 10px;
    color: #c8a84b;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .combo-plus {
    text-align: center;
    font-size: 20px;
    color: #c8a84b;
    font-weight: 500;
    line-height: 1;
  }
  .combo-tip-label {
    font-size: 10px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .combo-tip-text {
    font-size: 13px;
    color: #fff;
    line-height: 1.5;
    margin-top: 4px;
  }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; gap: 20px; }

  .card { transition: opacity 0.2s ease; }
  .card.fading { opacity: 0; }
  #grid-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
</style>
</head>
<body>
  <canvas id="grid-canvas"></canvas>
<a href="Links.html" style="position:fixed;top:16px;left:16px;z-index:9999;display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(20,20,20,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:20px;color:#aaa;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;text-decoration:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:color 0.15s,border-color 0.15s;" onmouseover="this.style.color='#fff';this.style.borderColor='rgba(200,168,75,0.5)'" onmouseout="this.style.color='#aaa';this.style.borderColor='rgba(255,255,255,0.1)'">← Back</a>
<div class="card">

  <!-- Intro screen -->
  <div id="screen-intro" class="screen active">
    <div class="wordmark">· TEDD GROOMING ·</div>
    <div>
      <p class="intro-headline">Find Your Perfect Product</p>
      <p class="intro-sub" style="margin-top:10px">5 quick questions. We'll match you to the right Tedd product for your hair.</p>
    </div>
    <button class="btn" id="btn-start">Start →</button>
  </div>

  <!-- Question screen -->
  <div id="screen-question" class="screen">
    <div class="wordmark">· TEDD GROOMING ·</div>
    <div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <p class="prog-label" id="prog-label">1 of 5</p>
    </div>
    <p class="question-text" id="question-text"></p>
    <div class="options" id="options-container"></div>
    <button class="btn" id="btn-next" disabled>Next →</button>
  </div>

  <!-- Result screen -->
  <div id="screen-result" class="screen">
    <div class="wordmark">· TEDD GROOMING ·</div>
    <div id="result-content"></div>
    <div id="combo-content" style="display:none"></div>
    <button class="btn" id="btn-combo" style="display:none">Get a Combo</button>
    <button class="btn" id="btn-retake">Retake quiz</button>
  </div>

</div>
<script>
  const QUESTIONS = [
    {
      text: "What's your biggest hair concern?",
      options: ['Dry & Frizzy', 'Oily & Greasy', 'Volume & Texture']
    },
    {
      text: 'How would you describe your hair thickness?',
      options: ['Thin', 'Medium', 'Thick']
    },
    {
      text: 'How does your hair behave naturally?',
      options: ['Straight', 'Wavy', 'Curly or Coily']
    },
    {
      text: 'What kind of hold do you want?',
      options: ['No Hold', 'Light & Flexible', 'Firm Hold', 'Strong Hold']
    },
    {
      text: 'What finish do you prefer?',
      options: ['Natural', 'Matte', 'Wet Finish', 'High Shine']
    }
  ];

  // State
  let currentQ = 0;
  let answers = new Array(QUESTIONS.length).fill(null);

  // DOM refs
  const card = document.querySelector('.card');
  const screens = {
    intro: document.getElementById('screen-intro'),
    question: document.getElementById('screen-question'),
    result: document.getElementById('screen-result')
  };
  const progFill = document.getElementById('prog-fill');
  const progLabel = document.getElementById('prog-label');
  const questionText = document.getElementById('question-text');
  const optionsContainer = document.getElementById('options-container');
  const btnNext = document.getElementById('btn-next');

  function showScreen(name) {
    card.classList.add('fading');
    setTimeout(() => {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
      card.classList.remove('fading');
    }, 200);
  }

  function renderQuestion(index) {
    const q = QUESTIONS[index];
    progFill.style.width = ((index / QUESTIONS.length) * 100) + '%';
    progLabel.textContent = (index + 1) + ' of ' + QUESTIONS.length;
    questionText.textContent = q.text;

    // Penned-out options based on prior answers
    const pennedOut = new Set();
    if (index === 3 && answers[0] === 2) pennedOut.add(0); // Volume & Texture → No Hold unavailable
    if (index === 3 && answers[0] === 1) pennedOut.add(0); // Oily & Greasy → No Hold unavailable
    if (index === 3 && answers[2] === 2) pennedOut.add(3); // Curly or Coily → Strong Hold unavailable
    if (index === 4 && answers[0] === 0) pennedOut.add(1); // Dry & Frizzy → Matte unavailable
    if (index === 4 && answers[0] === 0 && answers[3] !== 1 && answers[3] !== 2) pennedOut.add(0); // Dry & Frizzy → Natural unavailable (except Light & Flexible or Firm Hold)
    if (index === 4 && answers[3] !== 3) pennedOut.add(3); // High Shine only available with Strong Hold

    optionsContainer.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      const isSelected = answers[index] === i;
      const isPenned = pennedOut.has(i);
      btn.className = 'opt' + (isSelected ? ' selected' : '') + (isPenned ? ' penned' : '');
      btn.textContent = isPenned ? opt + ' — N/A' : opt;
      btn.disabled = isPenned;
      if (!isPenned) btn.addEventListener('click', () => selectOption(index, i));
      optionsContainer.appendChild(btn);
    });

    // If previously selected option is now penned, clear it
    if (pennedOut.has(answers[index])) {
      answers[index] = null;
      btnNext.disabled = true;
    }

    btnNext.disabled = answers[index] === null;
  }

  function selectOption(qIndex, optIndex) {
    answers[qIndex] = optIndex;
    document.querySelectorAll('.opt').forEach((btn, i) => {
      btn.classList.toggle('selected', i === optIndex);
    });
    btnNext.disabled = false;
  }

  function advance() {
    if (currentQ < QUESTIONS.length - 1) {
      currentQ++;
      renderQuestion(currentQ);
    } else {
      const scores = computeScores(answers);
      showResult(scores);
    }
  }

  function reset() {
    currentQ = 0;
    answers = new Array(QUESTIONS.length).fill(null);
    progFill.style.width = '0%';
    document.getElementById('combo-content').style.display = 'none';
    document.getElementById('combo-content').innerHTML = '';
    document.getElementById('btn-combo').style.display = 'none';
    renderQuestion(0);
    showScreen('question');
  }

  // Weight table: WEIGHTS[questionIndex][optionIndex] = [p0,p1,p2,p3,p4,p5,p6,p7,p8]
  // Products: 0=ClassicPomade 1=MoisturizingFixer 2=HairMousse 3=GroomingFixer
  //           4=StylingClay 5=Hairspray 6=MattifyingDust 7=FixingPomadeParf 8=FixingPomadeMix
  // Question order: Q1=Concern, Q2=Thickness, Q3=Behaviour, Q4=Hold, Q5=Finish
  const WEIGHTS = [
    // Q1: Concern — Dry(0) / Oily(1) / Volume(2)
    [
      [0, 7, 2, 1, 0, 0, 0, 0, 0],  // Dry & Frizzy — MoisturizingFixer dominates
      [0, 0, 0, 4, 3, 0, 3, 0, 0],  // Oily & Greasy — Grooming Fixer, Clay, Dust
      [0, 0, 2, 2, 3, 0, 0, 0, 0]   // Volume & Texture — Clay, Mousse, Grooming Fixer
    ],
    // Q2: Hair thickness — Thin(0) / Medium(1) / Thick(2)
    [
      [1, 2, 0, 2, 0, 0, 0, 0, 1],  // Thin
      [1, 1, 1, 1, 1, 1, 1, 1, 1],  // Medium
      [0, 0, 2, 0, 3, 2, 3, 2, 1]   // Thick
    ],
    // Q3: Natural behaviour — Straight(0) / Wavy(1) / Curly(2)
    [
      [2, 0, 0, 1, 1, 1, 1, 2, 2],  // Straight & Smooth
      [0, 2, 1, 2, 1, 0, 0, 0, 1],  // Wavy & Frizzy
      [0, 3, 2, 1, 0, 0, 0, 0, 0]   // Curly or Coily
    ],
    // Q4: Hold — No Hold(0) / Light(1) / Firm(2) / Strong(3)
    // MoisturizingFixer excluded from all hold categories — Mousse covers hold needs
    [
      [0, 0, 4, 2, 0, 0, 0, 0, 0],  // No Hold → Mousse, Grooming Fixer
      [1, 0, 2, 4, 0, 0, 0, 0, 0],  // Light & Flexible → Grooming Fixer, Mousse
      [1, 0, 4, 1, 0, 0, 3, 0, 2],  // Firm Hold → Mousse dominates, Dust (matte), FPMix (wet look)
      [2, 0, 1, 0, 4, 3, 2, 3, 0]   // Strong Hold — Clay, Hairspray, FPParf
    ],
    // Q5: Finish — Natural(0) / Matte(1) / Wet Finish(2) / High Shine(3)
    [
      [0, 0, 0, 2, 1, 0, 0, 0, 0],  // Natural → Grooming Fixer, Styling Clay
      [0, 0, 0, 1, 3, 0, 5, 0, 0],  // Matte → Dust wins lighter hold, Clay wins strong hold
      [2, 0, 1, 0, 0, 3, 0, 3, 3],  // Wet Finish → Hairspray, FPParf, FPMix, ClassicPomade
      [4, 0, 0, 0, 0, 1, 0, 1, 0]   // High Shine → Classic Pomade
    ]
  ];

  function computeScores(answers) {
    const scores = new Array(9).fill(0);
    answers.forEach((optIndex, qIndex) => {
      if (optIndex === null) return;
      const deltas = WEIGHTS[qIndex][optIndex];
      deltas.forEach((delta, productIndex) => {
        scores[productIndex] += delta;
      });
    });

    // Hard exclusions based on finish (Q5, index 4)
    const finish = answers[4];
    if (finish === 0) {
      // Natural: only Grooming Fixer allowed
      [0, 1, 2, 4, 5, 6, 7, 8].forEach(i => scores[i] = -1);
    }
    if (finish === 1) {
      // Matte: only Clay and Dust allowed
      [0, 1, 2, 3, 5, 7, 8].forEach(i => scores[i] = -1);
    }
    if (finish === 2 || finish === 3) {
      // Wet Finish or High Shine: exclude matte/natural products
      [3, 4, 6].forEach(i => scores[i] = -1);
    }

    // Dry & Frizzy: exclude Clay, Dust, and Grooming Fixer
    // Exception: Grooming Fixer allowed when finish=Natural + hold=Light & Flexible
    const concern = answers[0];
    const hold = answers[3];
    if (concern === 0) {
      [4, 6].forEach(i => scores[i] = -1);
      if (!(finish === 0 && (hold === 1 || hold === 2))) scores[3] = -1;
    }

    // Dry & Frizzy + No Hold → always Moisturizing Fixer, override everything
    if (concern === 0 && hold === 0) {
      scores.forEach((_, i) => { if (i !== 1) scores[i] = -1; });
      return scores;
    }

    // Moisturizing Fixer only wins when: No Hold + Dry & Frizzy
    if (hold !== 0 || concern !== 0) {
      scores[1] = -1;
    }

    // Light & Flexible: exclude Clay, Classic Pomade, Hairspray, Moisturizing Fixer
    if (hold === 1) {
      [0, 1, 4, 5].forEach(i => scores[i] = -1);
    }

    return scores;
  }

  const PRODUCTS = [
    {
      name: 'Classic Pomade',
      detail: 'Control hold · High shine · Wet look · 60g/150g',
      scent: 'Grapeberry',
      scentBg: '#3d0d0d',
      scentColor: '#c0392b'
    },
    {
      name: 'Moisturizing Fixer',
      detail: 'Anti-frizz · Wet finish · 150ml spray',
      scent: 'Appleberry',
      scentBg: '#2a0f1f',
      scentColor: '#9b4f7a'
    },
    {
      name: 'Hair Mousse',
      detail: 'Firm hold · Wet finish · 160ml pump',
      scent: 'Parfum',
      scentBg: '#0a2624',
      scentColor: '#2a9d8f'
    },
    {
      name: 'Grooming Fixer',
      detail: 'Firm hold · Natural finish · 120ml/250ml spray',
      scent: 'Apple spearmint',
      scentBg: '#0f2416',
      scentColor: '#4a9e5c'
    },
    {
      name: 'Styling Clay',
      detail: 'Firm hold · Natural finish · 60g/120g',
      scent: 'Vanilla musk',
      scentBg: '#1c1a12',
      scentColor: '#c8a84b'
    },
    {
      name: 'Hairspray',
      detail: 'Strong hold · Wet look · Finisher · 420ml',
      scent: 'Parfum',
      scentBg: '#0a2624',
      scentColor: '#2a9d8f'
    },
    {
      name: 'Mattifying Dust',
      detail: 'Firm hold · Matte finish',
      scent: 'Plain vanilla',
      scentBg: '#1e1e1a',
      scentColor: '#d6cfc0'
    },
    {
      name: 'Fixing Pomade',
      detail: 'Strong hold · Fiber · Wet look · 60g/150g',
      scent: 'Parfum',
      scentBg: '#0a2624',
      scentColor: '#2a9d8f'
    },
    {
      name: 'Fixing Pomade',
      detail: 'Medium hold · Fiber · Wet look · 60g/150g',
      scent: 'Mixfruit',
      scentBg: '#2d1900',
      scentColor: '#e8921a'
    }
  ];

  // Combo map: productIndex → [{ ci, tip }, ...]
  // Mattifying Dust (6) has no combo — sole use only
  const COMBOS = {
    0: [
      { ci: 1, tip: 'Spray Moisturizing Fixer on damp hair first to add softness and anti-frizz base, then work Classic Pomade through for high-shine control.' },
      { ci: 5, tip: 'Apply Classic Pomade to shape your style, then finish with Hairspray to lock it in place all day.' }
    ],
    1: [
      { ci: 2, tip: 'Start with Moisturizing Fixer on damp hair to lock in softness, then add Hair Mousse to define and hold without drying it out.' },
      { ci: 0, tip: 'Moisturizing Fixer as your prep base, then Classic Pomade for a polished high-shine finish on top.' },
      { ci: 4, tip: 'Spray Moisturizing Fixer first for anti-frizz hydration, then work Styling Clay through for firm natural-finish hold.' }
    ],
    2: [
      { ci: 1, tip: 'Spray Moisturizing Fixer on damp hair as a base, then apply Hair Mousse to define and hold your style with added softness.' },
      { ci: 4, tip: 'Apply Hair Mousse first to build volume and wet texture, then work Styling Clay through for firm hold with a natural finish.' }
    ],
    3: [
      { ci: 4, tip: 'Apply Grooming Fixer to set your style with firm hold, then layer Styling Clay for extra texture and grip.' }
    ],
    4: [
      { ci: 1, tip: 'Spray Moisturizing Fixer first for hydration and anti-frizz prep, then work Styling Clay through for firm natural-finish hold.' },
      { ci: 2, tip: 'Blow-dry with Hair Mousse to lift and build volume, then work Styling Clay through for texture and a firm finish.' },
      { ci: 3, tip: 'Apply Grooming Fixer to set direction and hold, then add Styling Clay on top for extra texture and grip.' }
    ],
    5: [
      { ci: 0, tip: 'Work Classic Pomade through to shape your style, then seal everything with Hairspray for all-day hold and wet look.' },
      { ci: 4, tip: 'Style with Styling Clay first to build shape and grip, then seal with Hairspray for lasting hold.' },
      { ci: 2, tip: 'Apply Hair Mousse on damp hair for prep and volume, then finish with Hairspray to lock your style in place.' },
      { ci: 7, tip: 'Work Fixing Pomade through for fiber hold and wet look, then set everything with Hairspray for maximum staying power.' }
    ],
    7: [
      { ci: 1, tip: 'Spray Moisturizing Fixer first for a soft hydrated base, then apply Fixing Pomade (parfum) for strong fiber hold and wet look.' },
      { ci: 2, tip: 'Work Hair Mousse through damp hair for prep and volume, then apply Fixing Pomade (parfum) to lock your style with strong fiber hold.' },
      { ci: 5, tip: 'Apply Fixing Pomade (parfum) to shape with fiber hold, then seal with Hairspray for maximum all-day staying power.' }
    ],
    8: [
      { ci: 1, tip: 'Spray Moisturizing Fixer first for a soft hydrated base, then apply Fixing Pomade (mixfruit) for medium fiber hold and wet look.' },
      { ci: 2, tip: 'Apply Hair Mousse on damp hair first for lightweight hold, then layer Fixing Pomade (mixfruit) to define and add wet look finish.' },
      { ci: 5, tip: 'Apply Fixing Pomade (mixfruit) to shape and define, then set with Hairspray to keep the style locked in all day.' }
    ]
  };

  function buildWhy(productIndex, answers) {
    const holdLabels = ['no hold needed', 'a light flexible hold', 'medium hold', 'strong all-day hold'];
    const finishLabels = ['a natural finish', 'a matte finish', 'a wet look', 'high shine'];
    const concernLabels = ['keeping hair moisturised and frizz-free', 'controlling oiliness', 'adding volume', 'styling and control'];

    const hold = holdLabels[answers[3]] || 'the right hold';
    const finish = finishLabels[answers[4]] || 'the right finish';
    const concern = concernLabels[answers[0]] || 'your hair concern';

    const whys = [
      `Your preference for ${finish} and classic control makes the Pomade the right call — reliable hold with a polished wet look.`,
      `With ${hold} and a focus on ${concern}, the Moisturizing Fixer keeps hair nourished and manageable without weighing it down.`,
      `You're after ${hold} and care about ${concern} — the Mousse builds structure and volume while staying soft to touch.`,
      `Light to medium hold with ${finish} suits your hair perfectly. The Grooming Fixer gives a clean, flexible finish without stiffness.`,
      `You want strong hold and a matte finish. The Styling Clay gives all-day texture and control with zero shine.`,
      `Strong hold, wet look, and finishing power — Hairspray locks your style in place and keeps it there all day.`,
      `Firm hold with a matte finish and your concern for ${concern} — Mattifying Dust absorbs oil and adds grip with no shine.`,
      `Strong hold with a fiber texture and wet look finish. The Fixing Pomade (parfum) gives serious hold with a sleek result.`,
      `Medium hold with a fiber texture and wet look finish. The Fixing Pomade (mixfruit) keeps things flexible with a defined, shiny result.`
    ];
    return whys[productIndex];
  }

  function buildPath(answers) {
    const labels = [
      { q: 'Concern', opts: ['Dry & Frizzy', 'Oily & Greasy', 'Volume & Texture'] },
      { q: 'Thickness', opts: ['Thin', 'Medium', 'Thick'] },
      { q: 'Behaviour', opts: ['Straight', 'Wavy', 'Curly or Coily'] },
      { q: 'Hold', opts: ['No Hold', 'Light & Flexible', 'Firm Hold', 'Strong Hold'] },
      { q: 'Finish', opts: ['Natural', 'Matte', 'Wet Finish', 'High Shine'] }
    ];
    const pills = labels.map(({ q, opts }, i) => {
      const val = answers[i] !== null ? opts[answers[i]] : '—';
      return `<div style="display:flex;flex-direction:column;gap:3px">
        <span style="font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.5px">${q}</span>
        <span style="font-size:12px;color:#fff;font-weight:500">${val}</span>
      </div>`;
    }).join('');
    return `
      <div class="result-divider"></div>
      <div>
        <p class="why-label" style="margin-bottom:10px">Your answers</p>
        <div style="display:flex;flex-wrap:wrap;gap:12px 20px">${pills}</div>
      </div>`;
  }

  function productCard(p, why) {
    return `
      <div>
        <p class="result-badge">Your match</p>
        <p class="result-name">${p.name}</p>
        <p class="result-detail">${p.detail}</p>
        <span class="scent-pill" style="background:${p.scentBg};color:${p.scentColor}">${p.scent}</span>
      </div>
      <div class="result-divider"></div>
      <div>
        <p class="why-label">Why this works for you</p>
        <p class="why-text">${why}</p>
      </div>
    `;
  }

  function showResult(scores) {
    const resultContent = document.getElementById('result-content');
    const PARFUM_IDX = 7;
    const MIXFRUIT_IDX = 8;

    const maxScore = Math.max(...scores);
    const winners = scores.map((s, i) => s === maxScore ? i : -1).filter(i => i >= 0);

    if (winners.length === 2 && winners.includes(PARFUM_IDX) && winners.includes(MIXFRUIT_IDX)) {
      resultContent.innerHTML = `
        <div>
          <p class="result-badge">Your match</p>
          <p class="result-name">Fixing Pomade</p>
          <p class="result-detail">Fiber hold · Wet look · Pick your scent</p>
          <div style="display:flex;gap:10px;margin-top:10px">
            <span class="scent-pill" style="background:#0a2624;color:#2a9d8f">Parfum</span>
            <span class="scent-pill" style="background:#2d1900;color:#e8921a">Mixfruit</span>
          </div>
        </div>
        <div class="result-divider"></div>
        <div>
          <p class="why-label">Why this works for you</p>
          <p class="why-text">Both Fixing Pomades suit your hair profile perfectly — same fiber hold and wet look finish. Pick the scent that appeals to you most.</p>
        </div>
      `;
    } else {
      const idx = winners[0];
      resultContent.innerHTML = productCard(PRODUCTS[idx], buildWhy(idx, answers));
    }

    resultContent.innerHTML += buildPath(answers);

    progFill.style.width = '100%';
    progLabel.textContent = '5 of 5';

    // Reset combo state
    document.getElementById('combo-content').style.display = 'none';
    document.getElementById('combo-content').innerHTML = '';
    const btnCombo = document.getElementById('btn-combo');

    const winnerIdx = winners.includes(PARFUM_IDX) && winners.includes(MIXFRUIT_IDX) && winners.length === 2
      ? null : winners[0];

    if (winnerIdx !== null && COMBOS[winnerIdx]) {
      btnCombo.style.display = 'block';
      btnCombo.onclick = () => showCombo(winnerIdx);
    } else {
      btnCombo.style.display = 'none';
    }

    showScreen('result');
  }

  function showCombo(winnerIdx) {
    const combos = COMBOS[winnerIdx];
    const primary = PRODUCTS[winnerIdx];
    const comboContent = document.getElementById('combo-content');

    const partnersHTML = combos.map(({ ci, tip }) => {
      const partner = PRODUCTS[ci];
      return `
        <div class="combo-card">
          <p class="combo-label">Combo suggestion</p>
          <div>
            <p style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.5px">Your pick</p>
            <p style="font-size:15px;font-weight:500;color:#c8a84b;margin-top:2px">${primary.name}</p>
            <span class="scent-pill" style="background:${primary.scentBg};color:${primary.scentColor}">${primary.scent}</span>
          </div>
          <div class="combo-plus">+</div>
          <div>
            <p style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.5px">Add on</p>
            <p style="font-size:15px;font-weight:500;color:#c8a84b;margin-top:2px">${partner.name}</p>
            <p style="font-size:12px;color:#fff;margin-top:2px">${partner.detail}</p>
            <span class="scent-pill" style="background:${partner.scentBg};color:${partner.scentColor}">${partner.scent}</span>
          </div>
          <div style="height:0.5px;background:#2a2820"></div>
          <div>
            <p class="combo-tip-label">How to use together</p>
            <p class="combo-tip-text">${tip}</p>
          </div>
        </div>`;
    }).join('');

    comboContent.innerHTML = partnersHTML;
    comboContent.style.display = 'block';
    document.getElementById('btn-combo').style.display = 'none';
  }

  // Event listeners
  document.getElementById('btn-start').addEventListener('click', () => {
    renderQuestion(0);
    showScreen('question');
  });
  btnNext.addEventListener('click', advance);
  document.getElementById('btn-retake').addEventListener('click', reset);
</script>
<script>
  (function(){
    const canvas=document.getElementById('grid-canvas');
    const ctx=canvas.getContext('2d');
    const CF=80,CN=40;
    let W,H,last=0,spawnTimer=0;
    const pulses=[];
    function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
    window.addEventListener('resize',resize);resize();
    function spawnPulse(){
      const horiz=Math.random()>.5;
      const count=horiz?Math.ceil(H/CN):Math.ceil(W/CN);
      const fixed=Math.floor(Math.random()*count)*CN;
      const fast=Math.random()>.75;
      const silver=Math.random()>.5;
      pulses.push({horiz,fixed,pos:-10,speed:fast?350+Math.random()*250:90+Math.random()*120,
        len:fast?50+Math.random()*70:20+Math.random()*40,
        alpha:0.2+Math.random()*0.25,color:silver?'210,220,255':'160,200,255',width:fast?1.5:1});
    }
    function drawGrid(){
      ctx.lineWidth=.5;
      ctx.strokeStyle='rgba(160,170,200,0.02)';
      for(let x=0;x<=W;x+=CF){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<=H;y+=CF){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      ctx.strokeStyle='rgba(190,200,220,0.045)';
      for(let x=0;x<=W;x+=CN){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<=H;y+=CN){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    }
    function frame(ts){
      const dt=Math.min((ts-last)/1000,.05);last=ts;
      ctx.clearRect(0,0,W,H);drawGrid();
      spawnTimer-=dt;
      if(spawnTimer<=0){spawnPulse();spawnTimer=0.2+Math.random()*0.4;}
      for(let i=pulses.length-1;i>=0;i--){
        const p=pulses[i];p.pos+=p.speed*dt;
        if(p.pos-p.len>(p.horiz?W:H)+10){pulses.splice(i,1);continue;}
        const x0=p.horiz?p.pos-p.len:p.fixed,y0=p.horiz?p.fixed:p.pos-p.len;
        const x1=p.horiz?p.pos:p.fixed,y1=p.horiz?p.fixed:p.pos;
        const g=ctx.createLinearGradient(x0,y0,x1,y1);
        g.addColorStop(0,'transparent');
        g.addColorStop(.3,`rgba(${p.color},${p.alpha*.4})`);
        g.addColorStop(.7,`rgba(${p.color},${p.alpha})`);
        g.addColorStop(1,`rgba(${p.color},${p.alpha*.1})`);
        ctx.save();ctx.shadowColor=`rgba(${p.color},.7)`;ctx.shadowBlur=6;
        ctx.strokeStyle=g;ctx.lineWidth=p.width;
        ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
        ctx.shadowBlur=10;ctx.lineWidth=p.width*1.5;
        ctx.strokeStyle=`rgba(${p.color},${p.alpha})`;
        ctx.beginPath();
        ctx.moveTo(p.horiz?p.pos-4:p.fixed,p.horiz?p.fixed:p.pos-4);
        ctx.lineTo(p.horiz?p.pos:p.fixed,p.horiz?p.fixed:p.pos);
        ctx.stroke();ctx.restore();
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(t=>{last=t;frame(t);});
  })();
</script>
