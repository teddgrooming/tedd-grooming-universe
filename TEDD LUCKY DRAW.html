<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEDD Grooming — Monthly Mystery Winner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --charcoal: #1a1a1a;
    --dark: #242424;
    --mid: #333333;
    --gold: #C9B97A;
    --gold-light: #e0d09a;
    --gold-dim: #8a7d50;
    --bone: #F2EFE6;
    --white: #ffffff;
    --muted: rgba(201,185,122,0.45);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    color: var(--bone);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── SCREENS ── */
  .screen { width: 100vw; min-height: 100vh; display: none; }
  .screen.active { display: flex; }

  /* ══════════════════════════════════════════
     SETUP SCREEN
  ══════════════════════════════════════════ */
  #setup {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: var(--black);
    position: relative;
  }

  .setup-corner {
    position: absolute;
    top: 36px; left: 48px;
    display: flex; align-items: center; gap: 14px;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .brand-sub {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .divider-v { width: 1px; height: 32px; background: var(--gold-dim); opacity: 0.4; }

  .setup-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 3vw, 42px);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    text-align: center;
  }
  .setup-sub {
    font-size: 13px;
    color: var(--gold-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-align: center;
  }

  .setup-box {
    background: var(--charcoal);
    border: 0.5px solid var(--gold-dim);
    border-radius: 12px;
    padding: 32px 36px;
    width: min(600px, 90vw);
  }

  .setup-box label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 10px;
  }

  #names-input {
    width: 100%;
    height: 200px;
    background: var(--dark);
    border: 0.5px solid #444;
    border-radius: 8px;
    color: var(--bone);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.8;
    padding: 14px 16px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  #names-input:focus { border-color: var(--gold-dim); }
  #names-input::placeholder { color: #555; }

  .count-pill {
    display: inline-block;
    margin-top: 10px;
    font-size: 12px;
    color: var(--gold-dim);
    letter-spacing: 0.06em;
    min-height: 18px;
  }

  .btn-start {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: var(--gold);
    color: var(--black);
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-start:hover { background: var(--gold-light); }
  .btn-start:active { transform: scale(0.98); }
  .btn-start:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ══════════════════════════════════════════
     LIVE DRAW SCREEN
  ══════════════════════════════════════════ */
  #live {
    flex-direction: column;
    background: var(--black);
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    border-bottom: 0.5px solid rgba(201,185,122,0.15);
    flex-shrink: 0;
  }
  .topbar-brand { display: flex; flex-direction: column; justify-content: center; }
  .topbar-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .topbar-tagline {
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .topbar-center {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 2.2vw, 28px);
    font-weight: 700;
    color: var(--bone);
    letter-spacing: 0.06em;
    text-align: center;
  }
  .topbar-center span { color: var(--gold); }

  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .btn-sm {
    padding: 8px 18px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 6px;
    border: 0.5px solid var(--gold-dim);
    background: transparent;
    color: var(--gold-dim);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .btn-sm:hover { background: var(--charcoal); color: var(--gold); border-color: var(--gold); }

  /* Main content */
  .main-content {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 0;
    overflow: hidden;
  }

  /* Left — wheel area */
  .wheel-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px 40px;
    border-right: 0.5px solid rgba(201,185,122,0.12);
  }

  .wheel-pointer {
    width: 0; height: 0;
    border-left: 13px solid transparent;
    border-right: 13px solid transparent;
    border-top: 28px solid var(--gold);
    filter: drop-shadow(0 0 6px rgba(201,185,122,0.5));
  }

  #wheel-canvas {
    border-radius: 50%;
    display: block;
    max-width: min(52vh, 480px);
    max-height: min(52vh, 480px);
    width: min(52vh, 480px);
    height: min(52vh, 480px);
  }

  .spin-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  .btn-spin-big {
    padding: 16px 56px;
    background: var(--gold);
    color: var(--black);
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-spin-big:hover { background: var(--gold-light); }
  .btn-spin-big:active { transform: scale(0.98); }
  .btn-spin-big:disabled { opacity: 0.3; cursor: not-allowed; }

  .spin-status {
    font-size: 13px;
    color: var(--gold-dim);
    letter-spacing: 0.08em;
    text-align: center;
    min-height: 20px;
  }

  /* Right — names + winners panel */
  .side-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--charcoal);
  }

  .panel-section {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px 24px;
  }
  .panel-section + .panel-section {
    border-top: 0.5px solid rgba(201,185,122,0.12);
  }

  .panel-title {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  /* Winners */
  .winners-section { flex-shrink: 0; }

  .winner-slots {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .winner-slot {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 0.5px solid rgba(201,185,122,0.2);
    background: var(--dark);
    min-height: 48px;
    transition: all 0.4s;
  }
  .winner-slot.filled {
    border-color: var(--gold);
    background: rgba(201,185,122,0.08);
  }
  .winner-slot.new-winner {
    animation: pop 0.5s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.95); opacity: 0; }
    60% { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }

  .slot-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(201,185,122,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--gold-dim);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .winner-slot.filled .slot-num {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--black);
  }

  .slot-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--bone);
    letter-spacing: 0.02em;
  }
  .slot-empty { font-size: 13px; color: #444; letter-spacing: 0.04em; }

  /* Name list */
  .names-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  .names-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-right: 4px;
  }
  .names-scroll::-webkit-scrollbar { width: 3px; }
  .names-scroll::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
  .names-scroll::-webkit-scrollbar-track { background: transparent; }

  .name-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    background: var(--dark);
    transition: opacity 0.3s, background 0.3s;
    flex-shrink: 0;
  }
  .name-entry.is-out {
    opacity: 0.2;
  }
  .name-entry.is-winner {
    background: rgba(201,185,122,0.08);
    opacity: 1;
  }

  .entry-num { font-size: 10px; color: #555; min-width: 20px; text-align: right; flex-shrink: 0; }
  .entry-name { font-size: 13px; color: var(--bone); flex: 1; }
  .entry-tag {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--gold);
    padding: 2px 7px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  /* Winner reveal overlay */
  .reveal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .reveal-overlay.show { display: flex; }

  .reveal-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }
  .reveal-num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 3vw, 28px);
    color: var(--gold-dim);
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .reveal-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 7vw, 88px);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.1;
    padding: 0 48px;
  }
  .reveal-line {
    width: 120px;
    height: 1px;
    background: var(--gold-dim);
    opacity: 0.4;
  }
  .btn-dismiss {
    margin-top: 8px;
    padding: 12px 40px;
    background: var(--gold);
    color: var(--black);
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-dismiss:hover { background: var(--gold-light); }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    display: none;
  }
  #confetti-canvas.show { display: block; }

  /* ══════════════════════════════════════════
     RESPONSIVE — MOBILE FIRST
  ══════════════════════════════════════════ */
  @media (max-width: 700px) {
    html, body { overflow: auto; }

    /* ── SETUP ── */
    #setup { justify-content: flex-start; padding: 16px 0 32px; }

    .setup-corner {
      position: relative;
      top: auto; left: auto;
      justify-content: center;
      margin-bottom: 18px;
      padding: 0 16px;
    }
    .brand-name { font-size: 18px; }

    .setup-title { font-size: clamp(22px, 6vw, 34px); margin-top: 4px; }
    .setup-sub   { font-size: 11px; margin-bottom: 24px; }

    .setup-box {
      padding: 20px 16px;
      border-radius: 10px;
    }
    #names-input { height: 160px; font-size: 13px; }

    /* ── LIVE SCREEN ── */
    #live { overflow: auto; height: auto; min-height: 100vh; }

    .topbar {
      padding: 12px 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .topbar-brand img { height: 36px !important; }
    .topbar-name  { font-size: 15px; }
    .topbar-tagline { font-size: 8px; }
    .topbar-center {
      font-size: clamp(13px, 4vw, 20px);
      order: 3;
      width: 100%;
      text-align: center;
    }
    .topbar-actions { gap: 6px; }
    .btn-sm { padding: 6px 10px; font-size: 10px; }

    /* Stack wheel + panel vertically */
    .main-content {
      display: flex;
      flex-direction: column;
      overflow: visible;
      height: auto;
    }

    .wheel-area {
      padding: 16px 12px;
      border-right: none;
      border-bottom: 0.5px solid rgba(201,185,122,0.12);
      gap: 12px;
    }

    #wheel-canvas {
      max-width: min(80vw, 320px);
      max-height: min(80vw, 320px);
      width: min(80vw, 320px);
      height: min(80vw, 320px);
    }

    .btn-spin-big {
      padding: 13px 36px;
      font-size: 13px;
    }

    /* Side panel becomes full-width below wheel */
    .side-panel {
      overflow: visible;
      height: auto;
      max-height: none;
    }

    .panel-section { padding: 14px 14px; }

    .winner-slot { min-height: 42px; }
    .slot-name   { font-size: 13px; }

    .names-section { overflow: visible; }
    .names-scroll  {
      max-height: 240px;
      overflow-y: auto;
    }

    /* Reveal overlay */
    .reveal-name {
      font-size: clamp(28px, 9vw, 60px);
      padding: 0 20px;
    }
    .reveal-num { font-size: clamp(15px, 4vw, 22px); }
    .btn-dismiss { padding: 10px 28px; font-size: 11px; }
  }

  /* Slightly relaxed tablet breakpoint */
  @media (min-width: 701px) and (max-width: 900px) {
    .main-content { grid-template-columns: 1fr 300px; }
    .topbar { padding: 14px 24px; }
    #wheel-canvas {
      max-width: min(46vh, 360px);
      max-height: min(46vh, 360px);
      width: min(46vh, 360px);
      height: min(46vh, 360px);
    }
  }
</style>
</head>

<script>
const GOLD = '#C9B97A';
const GOLD_DIM = '#8a7d50';
const GOLD_LIGHT = '#e0d09a';
const SLICE_COLORS = [
  '#1a1a1a','#2e2e2e','#C9B97A','#3a3a3a',
  '#b5a56a','#222222','#4a4a4a','#d4c48a',
  '#555544','#8a7d50','#1e1e1e','#c0aa6a'
];

let allNames = [], remaining = [], winners = [], winnerSet = new Set();
let angle = 0, spinning = false;
let confettiParticles = [], confettiAnim = null;

const canvas = document.getElementById('wheel-canvas');
const ctx = canvas ? canvas.getContext('2d') : null;

function toTitleCase(str) {
  const particles = ['bin','binti','bt','bte','a/l','a/p','al','abu','anak','van','de'];
  return str.toLowerCase().split(' ').map((w, i) => {
    if (i > 0 && particles.includes(w)) return w;
    return w.charAt(0).toUpperCase() + w.slice(1);
  }).join(' ');
}
function cleanName(raw) {
  return toTitleCase(raw.trim().replace(/\s+/g, ' '));
}

const namesInput = document.getElementById('names-input');
if (namesInput) namesInput.addEventListener('input', () => {
  const lines = namesInput.value.split('\n').map(l => l.trim()).filter(Boolean);
  const unique = [...new Set(lines.map(cleanName))];
  const n = unique.length;
  document.getElementById('count-pill').textContent = n > 0 ? `${n} participant${n > 1 ? 's' : ''} detected` : '';
  document.getElementById('btn-start').disabled = n < 2;
});

function startDraw() {
  _ac();
  const lines = namesInput.value.split('\n').map(l => l.trim()).filter(Boolean);
  allNames = [...new Set(lines.map(cleanName))];
  remaining = [...allNames];
  winners = []; winnerSet = new Set(); angle = 0;
  showScreen('live');
  initWheel();
  renderWinnerSlots();
  renderNameList();
  updateStatus();
}

function goSetup() { showScreen('setup'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Sound Engine ──
let _AC = null;
function _ac() {
  if (!_AC) _AC = new (window.AudioContext || window.webkitAudioContext)();
  if (_AC.state === 'suspended') _AC.resume();
  return _AC;
}

// ─── HIP-HOP TRAP ENGINE ─────────────────────────────────────────────────────
// 140 BPM trap, Cm, 808 bass + hi-hat rolls + snare + dark pads
const TR_BPM   = 140;
const TR_BEAT  = 60 / TR_BPM;
const TR_BAR   = TR_BEAT * 4;
const TR_LOOP  = TR_BAR * 8;
const TR_VOL   = 0.35;   // quiet but present

// Cm  Ab  Eb  Bb  — dark trap changes
const TR_CHORDS = [
  { root: 65.41, notes: [130.81, 155.56, 196.00, 261.63] }, // Cm
  { root: 51.91, notes: [103.83, 130.81, 155.56, 207.65] }, // Ab
  { root: 77.78, notes: [155.56, 196.00, 233.08, 311.13] }, // Eb
  { root: 58.27, notes: [116.54, 146.83, 174.61, 233.08] }, // Bb
];
function _trChordAt(bar) { return TR_CHORDS[Math.floor(bar/2) % 4]; }

let _tNodes   = [];
let _tTimer   = null;
let _tLoop    = 0;
let _tRunning = false;

function _tLP(ac, f, q) { const n=ac.createBiquadFilter(); n.type='lowpass'; n.frequency.value=f; if(q) n.Q.value=q; return n; }
function _tHP(ac, f)    { const n=ac.createBiquadFilter(); n.type='highpass'; n.frequency.value=f; return n; }

function _tNoise(ac, dur) {
  const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * dur), ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0; i<d.length; i++) d[i] = (Math.random() + Math.random() - 1) * 0.9;
  const s = ac.createBufferSource(); s.buffer = buf; return s;
}

function _tSafe(ac, t) { return Math.max(ac.currentTime + 0.002, t); }

// ── 808 BASS — the heart of trap ──
function _t808(ac, dest, freq, t, dur, vol) {
  t = _tSafe(ac, t);
  vol = vol || 0.9;
  const o  = ac.createOscillator();
  const g  = ac.createGain();
  const lp = _tLP(ac, 280, 0.8);
  o.type = 'sine';
  // 808 signature: pitch slides down from higher note
  o.frequency.setValueAtTime(freq * 2.5, t);
  o.frequency.exponentialRampToValueAtTime(freq, t + 0.06);
  // Long sustain with slow decay — classic 808 tail
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.setValueAtTime(vol * 0.85, t + 0.08);
  g.gain.exponentialRampToValueAtTime(vol * 0.4, t + 0.35);
  g.gain.exponentialRampToValueAtTime(0.0001, Math.max(t + 0.1, t + dur));
  o.connect(lp); lp.connect(g); g.connect(dest);
  o.start(t); o.stop(t + dur + 0.05);
  // Distorted layer for grit
  const o2  = ac.createOscillator();
  const g2  = ac.createGain();
  const lp2 = _tLP(ac, 120);
  o2.type = 'sawtooth'; o2.frequency.value = freq;
  g2.gain.setValueAtTime(0.0001, t);
  g2.gain.linearRampToValueAtTime(vol * 0.12, t + 0.015);
  g2.gain.exponentialRampToValueAtTime(0.0001, t + Math.min(dur, 0.25));
  o2.connect(lp2); lp2.connect(g2); g2.connect(dest);
  o2.start(t); o2.stop(t + 0.3);
  _tNodes.push(o, g, lp, o2, g2, lp2);
}

// ── TRAP KICK ──
function _tKick(ac, dest, t, vol) {
  t = _tSafe(ac, t); vol = vol || 1;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(45, t + 0.07);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.003);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(dest);
  o.start(t); o.stop(t + 0.25);
  // Punch transient
  const ns = _tNoise(ac, 0.012);
  const ng = ac.createGain();
  const lp = _tLP(ac, 2000);
  ng.gain.setValueAtTime(0.0001, t);
  ng.gain.linearRampToValueAtTime(vol * 0.3, t + 0.002);
  ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.014);
  ns.connect(lp); lp.connect(ng); ng.connect(dest);
  ns.start(t); ns.stop(t + 0.015);
  _tNodes.push(o, g, ns, ng, lp);
}

// ── TRAP SNARE (rimshot crack) ──
function _tSnare(ac, dest, t, vol) {
  t = _tSafe(ac, t); vol = vol || 1;
  // Noise crack
  const ns = _tNoise(ac, 0.16);
  const ng = ac.createGain();
  const bp = ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3500; bp.Q.value=0.5;
  const hp = _tHP(ac, 1200);
  ng.gain.setValueAtTime(0.0001, t);
  ng.gain.linearRampToValueAtTime(vol * 0.7, t + 0.002);
  ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
  ns.connect(bp); bp.connect(hp); hp.connect(ng); ng.connect(dest);
  ns.start(t); ns.stop(t + 0.18);
  // Body tone
  const o = ac.createOscillator();
  const og = ac.createGain();
  o.type = 'triangle'; o.frequency.value = 220;
  og.gain.setValueAtTime(0.0001, t);
  og.gain.linearRampToValueAtTime(vol * 0.4, t + 0.002);
  og.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
  o.connect(og); og.connect(dest);
  o.start(t); o.stop(t + 0.08);
  _tNodes.push(ns, ng, bp, hp, o, og);
}

// ── HI-HAT ROLL ──
function _tHat(ac, dest, t, vol, open) {
  t = _tSafe(ac, t);
  if (t >= ac.currentTime + 30) return; // don't schedule too far ahead
  const ns  = _tNoise(ac, open ? 0.15 : 0.025);
  const ng  = ac.createGain();
  const hp  = _tHP(ac, open ? 9000 : 11000);
  const dec = open ? 0.12 : 0.02;
  ng.gain.setValueAtTime(0.0001, t);
  ng.gain.linearRampToValueAtTime(vol, t + 0.001);
  ng.gain.exponentialRampToValueAtTime(0.0001, t + dec);
  ns.connect(hp); hp.connect(ng); ng.connect(dest);
  ns.start(t); ns.stop(t + dec + 0.005);
  _tNodes.push(ns, ng, hp);
}

// ── DARK SYNTH PAD ──
function _tPad(ac, dest, freq, t, dur, vol) {
  t = _tSafe(ac, t);
  const o1 = ac.createOscillator();
  const o2 = ac.createOscillator();
  const g  = ac.createGain();
  const lp = _tLP(ac, 900, 1.2);
  o1.type = 'sawtooth'; o1.frequency.value = freq;
  o2.type = 'sawtooth'; o2.frequency.value = freq * 1.005; // slight detune
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.3);
  g.gain.setValueAtTime(vol, Math.max(t + 0.4, t + dur - 0.3));
  g.gain.linearRampToValueAtTime(0, t + dur);
  o1.connect(g); o2.connect(g); g.connect(lp); lp.connect(dest);
  o1.start(t); o1.stop(t + dur + 0.1);
  o2.start(t); o2.stop(t + dur + 0.1);
  _tNodes.push(o1, o2, g, lp);
}

// ── TRAP HI-HAT ROLL PATTERN ──
// Trap signature: 16th-note rolls with triplet rushes
function _tHatPattern(ac, dest, barStart, vol) {
  const div16 = TR_BEAT * 0.5;     // 16th note
  const div32 = TR_BEAT * 0.25;    // 32nd note (roll)
  for (let beat = 0; beat < 4; beat++) {
    const bt = barStart + beat * TR_BEAT;
    // Standard 16th on every beat
    _tHat(ac, dest, bt, vol * 0.9, false);
    _tHat(ac, dest, bt + div16, vol * 0.55, false);
    // Roll burst on beat 2 and 4 (trap signature)
    if (beat === 1 || beat === 3) {
      for (let r = 1; r <= 4; r++) {
        const rt = bt + div16 + r * div32;
        if (rt < barStart + TR_BAR) {
          _tHat(ac, dest, rt, vol * (0.3 + r * 0.06), r === 4);
        }
      }
    } else {
      // Off-beat 16th
      _tHat(ac, dest, bt + div16 * 1.5, vol * 0.4, false);
    }
  }
}

// ── MAIN 808 PATTERN (changes per chord) ──
function _t808Pattern(ac, dest, bar) {
  const ch  = _trChordAt(bar);
  const bt  = _tSafe(ac, 0); // relative — caller adds barStart
  const r   = ch.root;
  // Beat 1: root (long)
  // Beat 2: fifth (short)
  // Beat 3: root again (long)
  // Beat 4: chromatic walkdown
  return [
    { offset: 0,              freq: r,        dur: TR_BEAT * 1.8 },
    { offset: TR_BEAT * 1.5,  freq: r * 1.5,  dur: TR_BEAT * 0.4 },
    { offset: TR_BEAT * 2,    freq: r,        dur: TR_BEAT * 1.5 },
    { offset: TR_BEAT * 3.5,  freq: r * 1.125,dur: TR_BEAT * 0.5 },
  ];
}

function _tScheduleLoop(ac, t0) {
  const now = ac.currentTime;
  if (t0 + TR_LOOP < now) return;

  // Master bus
  const master = ac.createGain(); master.gain.value = TR_VOL;
  const lp = _tLP(ac, 14000);
  master.connect(lp); lp.connect(ac.destination);
  _tNodes.push(master, lp);

  for (let bar = 0; bar < 8; bar++) {
    const bt = t0 + bar * TR_BAR;
    if (bt + TR_BAR < now) continue;

    const ch = _trChordAt(bar);

    // ── KICK pattern: 1, 2.5, 3, 4.75 (trap feel) ──
    [[0,1],[1.5,0.7],[2,1],[3.75,0.6]].forEach(([off, vol]) => {
      const kt = bt + off * TR_BEAT;
      if (kt >= now) _tKick(ac, master, kt, vol);
    });

    // ── SNARE: beat 2 and 4 ──
    [1, 3].forEach(off => {
      const st = bt + off * TR_BEAT;
      if (st >= now) _tSnare(ac, master, st);
    });

    // ── HI-HAT ROLLS ──
    _tHatPattern(ac, master, bt, 0.9);

    // ── 808 BASS ──
    _t808Pattern(ac, master, bar).forEach(({ offset, freq, dur }) => {
      const nt = bt + offset;
      if (nt >= now) _t808(ac, master, freq, nt, dur, 1.2);
    });

    // ── DARK PAD (2 bars sustained) ──
    if (bar % 2 === 0) {
      ch.notes.forEach((freq, i) => {
        _tPad(ac, master, freq, Math.max(now + 0.001, bt), TR_BAR * 2, 0.28 - i * 0.03);
      });
    }
  }
}

function _tNextLoop() {
  if (!_tRunning) return;
  const ac = _ac();
  _tScheduleLoop(ac, ac.currentTime + 0.05);
  _tLoop++;
  _tTimer = setTimeout(_tNextLoop, (TR_LOOP - 0.2) * 1000);
}

function _startAmbient() {
  if (_tRunning) return;
  _tRunning = true; _tLoop = 0; _tNodes = [];
  _tNextLoop();
}

function _stopAmbient() {
  _tRunning = false;
  if (_tTimer) { clearTimeout(_tTimer); _tTimer = null; }
  const ac = _ac();
  _tNodes.forEach(n => {
    if (n && n.gain && n.gain.setValueAtTime) {
      try { n.gain.setValueAtTime(n.gain.value, ac.currentTime); n.gain.linearRampToValueAtTime(0, ac.currentTime + 0.4); } catch(e) {}
    }
    if (n && n.stop) { try { n.stop(ac.currentTime + 0.45); } catch(e) {} }
  });
  _tNodes = [];
}


// ─── WHEEL TICK ──────────────────────────────────────────────────────────────
function _playTick(pitch) {
  pitch = pitch || 1;
  const ac = _ac();
  const t = ac.currentTime;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(220 * pitch, t);
  o.frequency.exponentialRampToValueAtTime(80, t + 0.035);
  g.gain.setValueAtTime(0.55, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t + 0.06);
}

// ─── CELEBRATION ─────────────────────────────────────────────────────────────
function _playWin() {
  const ac = _ac();
  const t = ac.currentTime;
  // Quick 3-note ding ding ding
  [[880,0],[1047,0.12],[1319,0.24]].forEach(([freq, delay]) => {
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t + delay);
    g.gain.linearRampToValueAtTime(0.5, t + delay + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + delay + 0.35);
    o.connect(g); g.connect(ac.destination);
    o.start(t + delay); o.stop(t + delay + 0.4);
  });
  // Short crowd cheer burst (noise sweep)
  const cheer = ac.createOscillator();
  const cheerGain = ac.createGain();
  const cheerFilter = ac.createBiquadFilter();
  cheer.type = 'sawtooth';
  cheer.frequency.setValueAtTime(200, t + 0.3);
  cheer.frequency.linearRampToValueAtTime(800, t + 0.7);
  cheerFilter.type = 'bandpass';
  cheerFilter.frequency.value = 1200;
  cheerFilter.Q.value = 0.5;
  cheerGain.gain.setValueAtTime(0.0001, t + 0.28);
  cheerGain.gain.linearRampToValueAtTime(0.18, t + 0.4);
  cheerGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
  cheer.connect(cheerFilter); cheerFilter.connect(cheerGain);
  cheerGain.connect(ac.destination);
  cheer.start(t + 0.28); cheer.stop(t + 0.85);
}

// ─── TICK INTERVAL ───────────────────────────────────────────────────────────
let _tickInterval = null;
let _tickSpeed = 60;
let _tickPitch = 1.5;

function _startTicks() {
  _tickSpeed = 60; _tickPitch = 1.5;
  if (_tickInterval) clearInterval(_tickInterval);
  _tickInterval = setInterval(() => _playTick(_tickPitch), _tickSpeed);
}

function _stopTicks() {
  if (_tickInterval) { clearInterval(_tickInterval); _tickInterval = null; }
}

function _setTickSpeed(progress) {
  const newSpeed = Math.round(45 + 260 * Math.pow(progress, 2));
  _tickPitch = 1.6 - progress * 1.0;
  if (Math.abs(newSpeed - _tickSpeed) > 20) {
    _tickSpeed = newSpeed;
    if (_tickInterval) {
      clearInterval(_tickInterval);
      _tickInterval = setInterval(() => _playTick(_tickPitch), _tickSpeed);
    }
  }
}


var _muted = false;
function toggleMute() {
  _muted = !_muted;
  var btn = document.getElementById('btn-mute');
  if (_muted) {
    _stopAmbient();
    _stopTicks();
    btn.innerHTML = '<i class="ti ti-volume-off" aria-hidden="true"></i> Sound off';
  } else {
    _startAmbient();
    btn.innerHTML = '<i class="ti ti-volume" aria-hidden="true"></i> Sound on';
  }
}

// Wrap playTick and playWin to respect mute
var _origPlayTick = _playTick;
var _origPlayWin = _playWin;
_playTick = function(p) { if (!_muted) _origPlayTick(p); };
_playWin  = function()  { if (!_muted) _origPlayWin();  };

function initWheel() {
  setTimeout(_startAmbient, 500);
  const isMobile = window.innerWidth <= 700;
  const size = isMobile
    ? Math.min(window.innerWidth * 0.80, 320)
    : Math.min(window.innerWidth * 0.48, window.innerHeight * 0.58, 500);
  canvas.width = size; canvas.height = size;
  drawWheel();
}

function drawWheel() {
  const size = canvas.width;
  const cx = size / 2, cy = size / 2, r = size / 2 - 2;
  ctx.clearRect(0, 0, size, size);

  if (remaining.length === 0) {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = GOLD;
    ctx.font = `700 ${size * 0.04}px Inter, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('All winners drawn!', cx, cy);
    return;
  }

  const n = remaining.length;
  const slice = (Math.PI * 2) / n;

  for (let i = 0; i < n; i++) {
    const s = angle + i * slice, e = s + slice;
    const col = SLICE_COLORS[i % SLICE_COLORS.length];
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, e); ctx.closePath();
    ctx.fillStyle = col; ctx.fill();
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(s + slice / 2);
    const isLight = ['#C9B97A','#d4c48a','#b5a56a','#c0aa6a','#e0d09a'].includes(col);
    ctx.fillStyle = isLight ? '#1a1a1a' : GOLD;
    const parts = remaining[i].split(' ');
    const label = parts[0] + (parts.length > 1 ? ' ' + parts[1].charAt(0) + '.' : '');
    const fontSize = n > 24 ? size * 0.025 : n > 14 ? size * 0.03 : size * 0.035;
    ctx.font = `500 ${fontSize}px Inter, sans-serif`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    const disp = label.length > 14 ? label.slice(0, 13) + '…' : label;
    ctx.fillText(disp, r - size * 0.04, 0);
    ctx.restore();
  }

  ctx.beginPath(); ctx.arc(cx, cy, size * 0.065, 0, Math.PI * 2);
  ctx.fillStyle = GOLD; ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 2; ctx.stroke();
}

let _spinAnimId = null;
let _spinStartA = 0, _spinStartT = 0, _spinTotalRot = 0, _spinDur = 0, _spinWinner = '';

function _spinEase(t) { return 1 - Math.pow(1 - t, 3.5); }

function _spinFrame(now) {
  const p = Math.min((now - _spinStartT) / _spinDur, 1);
  angle = _spinStartA + _spinTotalRot * _spinEase(p);
  drawWheel();
  _setTickSpeed(p);
  if (p < 1) {
    _spinAnimId = requestAnimationFrame(_spinFrame);
    return;
  }
  // Animation complete
  _stopTicks();
  _spinAnimId = null;
  spinning = false;
  angle = angle % (Math.PI * 2);

  // Remove winner from remaining
  const idx = remaining.indexOf(_spinWinner);
  if (idx !== -1) remaining.splice(idx, 1);
  winners.push(_spinWinner);
  winnerSet.add(_spinWinner);

  // Update UI
  drawWheel();
  renderWinnerSlots();
  renderNameList();

  // Re-enable button immediately so it's ready after overlay closes
  const drawn = winners.length;
  const remain = remaining.length;
  const _ss = document.getElementById('spin-status'); if (_ss) _ss.textContent = '';
  if (drawn >= 5 || remain === 0) {
    document.getElementById('btn-spin').disabled = true;
    document.getElementById('btn-spin').textContent = drawn >= 5 ? '5 winners drawn!' : 'Draw complete!';
    document.getElementById('spin-status').textContent = 'All winners have been selected.';
  } else {
    document.getElementById('btn-spin').disabled = false;
    document.getElementById('btn-spin').textContent = 'Spin the wheel';
    document.getElementById('spin-status').textContent = remain + ' participants remaining';
  }

  updateStatus();

  // Show the reveal overlay LAST
  setTimeout(() => showReveal(_spinWinner), 50);
}

function spin() {
  if (spinning || remaining.length === 0 || winners.length >= 5) return;
  if (_spinAnimId) { cancelAnimationFrame(_spinAnimId); _spinAnimId = null; }
  _ac();
  spinning = true;
  document.getElementById('btn-spin').disabled = true;
  const _spinSt = document.getElementById('spin-status'); if (_spinSt) _spinSt.textContent = 'Spinning...';

  const winIdx = Math.floor(Math.random() * remaining.length);
  _spinWinner = remaining[winIdx];
  const n = remaining.length;
  const slice = (Math.PI * 2) / n;
  // Pointer is at the TOP of the wheel (−π/2). We need to rotate so that
  // the centre of slice[winIdx] lands at −π/2 (pointing up under the arrow).
  const pointerAngle = -Math.PI / 2;
  const target = pointerAngle - (winIdx * slice + slice / 2);
  const extra = (6 + Math.floor(Math.random() * 5)) * Math.PI * 2;
  _spinTotalRot = extra + (((target - angle) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  _spinDur = 4000 + Math.random() * 1000;
  _spinStartA = angle;
  _spinStartT = performance.now();
  _startTicks();
  _spinAnimId = requestAnimationFrame(_spinFrame);
}

function updateStatus() {
  const remain = remaining.length;
  const drawn = winners.length;
  const rc = document.getElementById('remain-count');
  const nc = document.getElementById('names-count');
  if (rc) rc.textContent = remain;
  if (nc) nc.textContent = allNames.length;

  const center = document.getElementById('topbar-center');
  if (drawn >= 5 || remain === 0) {
    center.innerHTML = `Draw complete — <span>${drawn} winner${drawn > 1 ? 's' : ''} selected</span>`;
    document.getElementById('btn-spin').disabled = true;
    document.getElementById('btn-spin').textContent = drawn >= 5 ? '5 winners drawn!' : 'Draw complete!';
    document.getElementById('spin-status').textContent = 'All winners have been selected.';
  } else {
    center.innerHTML = `Winner <span>${drawn + 1} of 5</span> — spin to reveal`;
    document.getElementById('btn-spin').disabled = false;
    document.getElementById('btn-spin').textContent = 'Spin the wheel';
    document.getElementById('spin-status').innerHTML = `<span id="remain-count">${remain}</span> participants remaining`;
  }
}

// ── Winner slots ──
function renderWinnerSlots() {
  const el = document.getElementById('winner-slots');
  el.innerHTML = Array.from({ length: 5 }, (_, i) => {
    const w = winners[i];
    const isNew = i === winners.length - 1 && w;
    return `<div class="winner-slot ${w ? 'filled' : ''} ${isNew ? 'new-winner' : ''}">
      <div class="slot-num">${i + 1}</div>
      ${w
        ? `<div class="slot-name">${w}</div>`
        : `<div class="slot-empty">—</div>`}
    </div>`;
  }).join('');
}

// ── Name list ──
function renderNameList() {
  const el = document.getElementById('names-scroll');
  const frag = document.createDocumentFragment();
  allNames.forEach((n, i) => {
    const isWinner = winnerSet.has(n);
    const wNum = winners.indexOf(n);
    const div = document.createElement('div');
    div.className = 'name-entry' + (isWinner ? ' is-winner is-out' : '');
    div.innerHTML = `<span class="entry-num">${i + 1}</span><span class="entry-name">${n}</span>${isWinner ? `<span class="entry-tag">W${wNum + 1}</span>` : ''}`;
    frag.appendChild(div);
  });
  el.innerHTML = '';
  el.appendChild(frag);
}

// ── Winner reveal ──
function showReveal(name) {
  _playWin();
  const num = winners.length;
  document.getElementById('reveal-num').textContent = `Winner ${num} of 5`;
  document.getElementById('reveal-name').textContent = name;
  document.getElementById('reveal-overlay').classList.add('show');
  launchConfetti();
}

function dismissReveal() {
  document.getElementById('reveal-overlay').classList.remove('show');
  stopConfetti();
  // Always re-evaluate button state after dismiss
  const drawn = winners.length;
  const remain = remaining.length;
  if (drawn < 5 && remain > 0) {
    document.getElementById('btn-spin').disabled = false;
    document.getElementById('btn-spin').textContent = 'Spin the wheel';
  }
}

// ── Confetti ──
function launchConfetti() {
  const cc = document.getElementById('confetti-canvas');
  cc.width = window.innerWidth; cc.height = window.innerHeight;
  cc.classList.add('show');
  const cctx = cc.getContext('2d');
  const colors = [GOLD, GOLD_LIGHT, '#ffffff', GOLD_DIM, '#e8e0c0'];
  confettiParticles = Array.from({ length: 120 }, () => ({
    x: Math.random() * cc.width,
    y: -10 - Math.random() * 100,
    w: 6 + Math.random() * 8,
    h: 3 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    speed: 2.5 + Math.random() * 3,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.15,
    drift: (Math.random() - 0.5) * 1.5,
  }));

  function drawConfetti() {
    cctx.clearRect(0, 0, cc.width, cc.height);
    let alive = false;
    confettiParticles.forEach(p => {
      p.y += p.speed; p.x += p.drift; p.angle += p.spin;
      if (p.y < cc.height + 20) alive = true;
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.angle);
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      cctx.restore();
    });
    if (alive) confettiAnim = requestAnimationFrame(drawConfetti);
    else stopConfetti();
  }
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  confettiAnim = requestAnimationFrame(drawConfetti);
}

function stopConfetti() {
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  const cc = document.getElementById('confetti-canvas');
  cc.classList.remove('show');
  cc.getContext('2d').clearRect(0, 0, cc.width, cc.height);
}

// ── Reset ──
function resetDraw() {
  remaining = [...allNames];
  winners = []; winnerSet = new Set(); angle = 0;
  renderWinnerSlots(); renderNameList(); drawWheel(); updateStatus();
  document.getElementById('btn-spin').textContent = 'Spin the wheel';
  document.getElementById('spin-status').textContent = `${remaining.length} participants ready`;
}

window.addEventListener('resize', () => { if (document.getElementById('live').classList.contains('active')) initWheel(); });
</script>
